; PlatformIO configuration for two workflows:
; 1. ESP32 firmware build/upload (`env:esp32doit-devkit-v1`)
; 2. Desktop unit tests for SnakeCore (`env:native`)
;
; Run firmware build:
;   pio run
;
; Upload to ESP32:
;   pio run --target upload
;
; Run native unit tests:
;   pio test -e native

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps = 
	adafruit/Adafruit GFX Library@^1.12.5
	adafruit/Adafruit SSD1306@^2.5.16
	arduinogetstarted/ezButton@^1.0.6

; Desktop test environment for the pure gameplay core.
; `test_build_src = no` keeps firmware sources out of the native test build.
[env:native]
platform = native
test_framework = unity
test_build_src = no
